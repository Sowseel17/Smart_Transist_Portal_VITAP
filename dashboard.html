<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Smart Transit Portal</title>
  <meta name="description" content="Planner dashboard for routes from VIT-AP with sorting and mode selection.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <header class="container dashboard-top">
    <p class="eyebrow">Smart Transit Dashboard</p>
    <div class="session-row">
      <p id="session-badge" class="session-badge">Signed in as user</p>
      <button id="logout-btn" type="button" class="secondary-btn">Logout</button>
    </div>
  </header>

  <main class="container dashboard-layout">
    <section class="planner-panel" id="planner" aria-label="Trip planner">
      <h2>Trip Planner</h2>
      <div class="selector-grid">
        <div class="form-group">
          <label for="source-select">Present Place</label>
          <select id="source-select">
            <option value="">Choose source</option>
            <option value="Vijayawada Bus Stand">Vijayawada Bus Stand</option>
            <option value="Vijayawada Railway Station">Vijayawada Railway Station</option>
            <option value="Vijayawada Airport">Vijayawada Airport</option>
            <option value="VIT-AP University">VIT-AP University</option>
            <option value="Mangalagiri">Mangalagiri</option>
          </select>
        </div>

        <div class="form-group">
          <label for="destination-select">Required Destination</label>
          <select id="destination-select">
            <option value="">Choose destination</option>
            <option value="VIT-AP University">VIT-AP University</option>
            <option value="Vijayawada Bus Stand">Vijayawada Bus Stand</option>
            <option value="Vijayawada Railway Station">Vijayawada Railway Station</option>
            <option value="Vijayawada Airport">Vijayawada Airport</option>
            <option value="Mangalagiri">Mangalagiri</option>
          </select>
        </div>
      </div>

      <div class="action-row">
        <button type="button" id="show-modes" class="primary-btn">Show Available Modes</button>
        <button type="button" id="swap-route" class="secondary-btn">Swap Source / Destination</button>
        <button type="button" id="reset-planner" class="secondary-btn">Reset Planner</button>
      </div>

      <p id="planner-message" class="form-message" aria-live="polite"></p>

      <div class="sort-row">
        <label for="sort-select">Sort available modes:</label>
        <select id="sort-select">
          <option value="recommended">Recommended</option>
          <option value="lowest-fare">Lowest Fare</option>
          <option value="fastest-time">Fastest Time</option>
        </select>
      </div>

      <section>
        <h3>Available Modes Of Transport</h3>
        <div id="mode-list" class="modes-grid" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <footer class="container footer">
    <p>Smart Transit Portal for VIT-AP | Front-end project using HTML, CSS, and JavaScript</p>
  </footer>

  <script src="dashboard.js"></script>
</body>
</html>
